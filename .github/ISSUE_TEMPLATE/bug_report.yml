name: Bug report
description: Report a reproducible problem on a Starcat website surface
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Security vulnerabilities belong in GitHub Security Advisories. Remove credentials, tokens, private data, and sensitive URLs from this report.
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Direct website
        - App Store website
        - Direct test website
        - Blog
        - Changelog
        - Privacy policy or EULA
        - Local admin UI
        - Other
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Affected URL or file
      placeholder: https://starcat.ink/... or direct/index.html
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS version, browser name and version, language
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized screenshots or console output
      description: Remove all credentials, private data, and sensitive request details.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and removed sensitive information.
          required: true
