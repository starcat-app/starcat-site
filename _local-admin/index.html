<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Starcat Local Admin</title>
  <link rel="icon" type="image/png" href="/starcat-logo.png">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8fb;
      --surface: #ffffff;
      --surface-soft: #f1f4f8;
      --text: #152033;
      --muted: #64748b;
      --border: #d8dee8;
      --accent: #2563eb;
      --accent-soft: #e8f0ff;
      --ok: #15803d;
      --warn: #b45309;
      --bad: #b91c1c;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #10141d;
        --surface: #171c27;
        --surface-soft: #202737;
        --text: #edf2f7;
        --muted: #9aa7ba;
        --border: #30394c;
        --accent: #6ea8ff;
        --accent-soft: #1b2c47;
        --ok: #4ade80;
        --warn: #facc15;
        --bad: #fb7185;
        --shadow: 0 14px 36px rgba(0, 0, 0, 0.25);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .shell {
      width: min(1360px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 720;
    }

    .subtitle {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 8px;
      min-height: 34px;
      padding: 7px 12px;
      cursor: pointer;
      transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }

    .button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .button.primary {
      border-color: transparent;
      background: var(--accent);
      color: #fff;
    }

    .button.danger {
      color: var(--bad);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 24px;
      line-height: 1;
      font-weight: 720;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .fly-env-panel {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 12px;
    }

    .fly-env-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .fly-env-title {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .fly-env-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .fly-env-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .fly-env-table {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    .fly-env-row {
      display: grid;
      grid-template-columns: 28px minmax(130px, 0.4fr) minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .fly-env-name {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .fly-env-empty {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .fly-env-value {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--text);
      padding: 7px 10px;
      outline: none;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .service-title {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--muted);
      flex: 0 0 auto;
    }

    .dot.ok {
      background: var(--ok);
    }

    .dot.warn {
      background: var(--warn);
    }

    .dot.bad {
      background: var(--bad);
    }

    .endpoint {
      margin-top: 6px;
      color: var(--muted);
      font-family: "SF Mono", Consolas, monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-soft);
      min-height: 26px;
      padding: 3px 9px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .card-body {
      padding: 14px 16px 16px;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .check {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
      padding: 10px;
      min-height: 70px;
    }

    .check-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .check-value {
      font-size: 13px;
      line-height: 1.35;
      word-break: break-word;
    }

    .check-value.ok {
      color: var(--ok);
    }

    .check-value.warn {
      color: var(--warn);
    }

    .check-value.bad {
      color: var(--bad);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .data-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
      padding: 12px;
    }

    .data-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px;
      min-height: 68px;
    }

    .metric-name {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 7px;
    }

    .metric-value {
      font-size: 20px;
      line-height: 1.1;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .metric.long .metric-value {
      font-size: 14px;
      line-height: 1.35;
      font-weight: 650;
    }

    .metric.full {
      grid-column: 1 / -1;
    }

    .mock-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .api-console {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 12px;
    }

    .api-console-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .api-console-title {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .api-request-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 10px;
    }

    .api-endpoint-select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--text);
      padding: 8px 10px;
      outline: none;
    }

    .api-send {
      min-height: 38px;
      padding-inline: 18px;
    }

    .api-description {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .api-param-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .api-param-field {
      display: grid;
      gap: 6px;
    }

    .api-param-field label {
      color: var(--muted);
      font-size: 12px;
    }

    .api-param-field input,
    .api-param-field select {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--text);
      padding: 7px 10px;
      outline: none;
    }

    .api-body-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .api-body {
      width: 100%;
      min-height: 112px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--text);
      padding: 10px;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      outline: none;
      margin-bottom: 10px;
    }

    .api-endpoint-select:focus,
    .api-param-field input:focus,
    .api-param-field select:focus,
    .api-body:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .param-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .param-field {
      display: grid;
      gap: 6px;
    }

    .param-field label {
      color: var(--muted);
      font-size: 12px;
    }

    .param-field input {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--text);
      padding: 7px 10px;
      outline: none;
    }

    .param-field select {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--text);
      padding: 7px 10px;
      outline: none;
    }

    .param-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .param-field select:focus,
    .fly-env-value:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .json-output {
      width: 100%;
      max-height: 360px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--text);
      padding: 12px;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .last-link {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .api-result-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .api-result-actions .last-link {
      margin: 0;
      flex: 1 1 260px;
    }

    .weekly-ops {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .weekly-ops-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 12px;
    }

    .weekly-ops-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .weekly-source-row,
    .weekly-pin-row,
    .weekly-search-row {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) repeat(4, minmax(68px, auto));
      gap: 8px;
      align-items: center;
      min-height: 38px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .weekly-source-row:last-child,
    .weekly-pin-row:last-child,
    .weekly-search-row:last-child {
      border-bottom: 0;
    }

    .weekly-ops-controls {
      display: flex;
      gap: 8px;
      align-items: end;
      flex-wrap: wrap;
    }

    .weekly-ops-controls .param-field {
      min-width: 130px;
      flex: 1 1 130px;
    }

    .weekly-ops-note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .weekly-pin-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .log {
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .log-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }

    .log-title {
      margin: 0;
      font-size: 15px;
    }

    .log-lines {
      max-height: 260px;
      overflow: auto;
      padding: 12px 16px;
      font-family: "SF Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
      white-space: pre-wrap;
    }

    .config-warning {
      display: none;
      margin-bottom: 18px;
      border: 1px solid rgba(180, 83, 9, 0.45);
      border-radius: 8px;
      background: rgba(180, 83, 9, 0.10);
      padding: 12px 14px;
      color: var(--warn);
      line-height: 1.55;
      font-size: 13px;
    }

    .config-warning.show {
      display: block;
    }

    @media (max-width: 980px) {
      .shell {
        width: min(100vw - 24px, 760px);
      }

      header {
        align-items: stretch;
        flex-direction: column;
      }

      .header-actions {
        justify-content: flex-start;
      }

      .status-strip,
      .grid,
      .checks,
      .metrics,
      .api-request-row,
      .api-param-grid,
      .fly-env-row {
        grid-template-columns: 1fr;
      }

      .weekly-source-row,
      .weekly-pin-row,
      .weekly-search-row {
        grid-template-columns: 1fr;
      }

      .api-send {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>Starcat Local Admin</h1>
        <p class="subtitle">本地运维面板：查看 supports 服务健康状态、读取公开统计，并触发已存在的管理接口。真实 API Key 只从本目录的 config.js 读取。</p>
      </div>
      <div class="header-actions">
        <button class="button" id="refreshAllButton" type="button">刷新全部</button>
        <button class="button primary" id="openConfigButton" type="button">查看配置状态</button>
      </div>
    </header>

    <section class="config-warning" id="configWarning">
      未加载 <code>config.js</code>。请复制 <code>config.example.js</code> 为 <code>config.js</code> 并填入本地 baseURL 与 API Key。
    </section>

    <section class="status-strip" aria-label="服务概览">
      <div class="stat">
        <div class="stat-label">已配置服务</div>
        <div class="stat-value" id="configuredCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Health OK</div>
        <div class="stat-value" id="healthOkCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Ping OK</div>
        <div class="stat-value" id="pingOkCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">最近刷新</div>
        <div class="stat-value" id="lastRefresh">-</div>
      </div>
    </section>

    <section class="grid" id="servicesGrid" aria-label="服务列表"></section>

    <section class="log" aria-label="操作日志">
      <div class="log-head">
        <h2 class="log-title">操作日志</h2>
        <button class="button" id="clearLogButton" type="button">清空</button>
      </div>
      <div class="log-lines" id="logLines">等待操作...</div>
    </section>
  </main>

  <script src="./config.js"></script>
  <script>
    /*
     * This panel deliberately stays frontend-only. It reads private endpoints
     * from a local config file and calls existing Starcat admin APIs without
     * adding a second source of truth for backend operations.
     */
    const SERVICES = {
      sharing: {
        fallbackLabel: "Sharing",
        description: "分享短链服务",
        checks: ["health", "ping"],
        stats: [
          { label: "Total shares", type: "count", path: "/internal/stats", pick: "data.total_shares", help: "来自 GET /internal/stats 的 data.total_shares，直接 SELECT COUNT(*) FROM shares，表示当前已创建分享链接总数。" },
          { label: "说明", type: "text", value: "在 API Console 选择 POST /api/v1/share，可编辑 JSON body 后生成分享链接。", help: "Sharing 正式数据由 POST /api/v1/share 创建，返回 data.share_url / data.share_id；生成后面板会提供打开与复制最近链接。" }
        ],
        actions: []
      },
      trending: {
        fallbackLabel: "Trending",
        description: "GitHub Trending 数据服务",
        checks: ["health", "ping"],
        stats: [
          { label: "Daily repos", type: "count", path: "/internal/stats", pick: "data.repos.daily", help: "来自 GET /internal/stats 的 data.repos.daily，直接从 SQLite COUNT(*) 得到，不受 /api/v1/repos 的 limit 影响。" },
          { label: "Total repos", type: "count", path: "/internal/stats", pick: "data.repos.total", help: "来自 GET /internal/stats 的 data.repos.total，等于 daily + weekly + monthly 三个桶的真实 DB 计数之和。" },
          { label: "Languages", type: "count", path: "/internal/stats", pick: "data.languages", help: "来自 GET /internal/stats 的 data.languages，表示当前 trending repo 聚合出的语言分类数。" },
          { label: "Users probe", type: "count", path: "/api/v1/users?since=daily&sponsorable=true", pick: "meta.total", help: "来自 GET /api/v1/users?since=daily&sponsorable=true 的 meta.total；users 当前按需实时抓取，不是持久化总量，也不代表历史累计用户数。" }
        ],
        actions: [
          { label: "同步 repos", path: "/internal/sync/repos", auth: "apiKey", confirm: false },
          { label: "刷新 languages", path: "/internal/sync/languages", auth: "apiKey", confirm: false },
          { label: "强制 enrich", path: "/internal/enrich/force", auth: "apiKey", confirm: true }
        ]
      },
      weekly: {
        fallbackLabel: "Weekly",
        description: "Weekly 多来源采集、异步补全与聚合数据服务",
        checks: ["health", "ping"],
        stats: [
          { label: "Repos", type: "count", path: "/api/v1/repos?page=1&page_size=1", pick: "meta.total", help: "来自 GET /api/v1/repos?page=1&page_size=1 的 meta.total；表示 weekly 聚合库中可用 repo 总量，不受 page_size=1 影响。" },
          { label: "Languages", type: "count", path: "/api/v1/repos/languages", pick: "meta.total", help: "来自 GET /api/v1/repos/languages 的 meta.total；表示聚合 repo 当前可筛选语言数量。" },
          { label: "HelloGitHub", type: "count", path: "/api/v1/repos?page=1&page_size=1&source=hellogithub", pick: "meta.total", help: "HelloGitHub 月刊与 featured API 统一聚合后的可用仓库数。" },
          { label: "AI 情报", type: "count", path: "/api/v1/repos?page=1&page_size=1&source=ai_intelligence", pick: "meta.total", help: "经 Skill 核验并通过批量 API 录入的 AI 情报仓库数。" }
        ],
        actions: [
          { label: "同步 weekly", path: "/internal/sync/weekly", auth: "adminKey", confirm: false },
          { label: "同步 zread", path: "/internal/sync/zread", auth: "adminKey", confirm: false },

    function safeURL(baseURL, path) {
      const normalizedBase = String(baseURL || "").replace(/\/+$/, "");
      const normalizedPath = String(path || "").startsWith("/") ? path : `/${path}`;
      return `${normalizedBase}${normalizedPath}`;
    }

    function authHeaders(cfg, authName) {
      const key = cfg[authName || "apiKey"];
      return key ? { Authorization: `Bearer ${key}` } : {};
    }

    function log(message, level = "info") {
      const now = new Date().toLocaleTimeString();
      const prefix = level === "error" ? "ERR" : level === "warn" ? "WARN" : "INFO";
      const current = logLines.textContent === "等待操作..." ? "" : `${logLines.textContent}\n`;
      logLines.textContent = `${current}[${now}] ${prefix} ${message}`;
      logLines.scrollTop = logLines.scrollHeight;
    }

    function readPath(source, path) {
      if (!path) return source;
      return path.split(".").reduce((value, key) => {
        if (value == null) return undefined;
        const match = key.match(/^([^\[\]]+)\[([^=\]]+)=([^\]]+)\]$/);
        if (match) {
          const [, arrayKey, filterKey, filterValue] = match;
          const items = value[arrayKey];
          if (!Array.isArray(items)) return undefined;
          return items.find((item) => String(item && item[filterKey]) === filterValue);
        }
        return value[key];
      }, source);
    }

    function summarizeValue(value) {
      if (Array.isArray(value)) return value.length;
      if (typeof value === "number") return value.toLocaleString();
      if (typeof value === "string") return value;
      if (value && typeof value === "object") {
        if (typeof value.total === "number") return value.total.toLocaleString();
        if (typeof value.count === "number") return value.count.toLocaleString();
        return Object.keys(value).length.toLocaleString();
      }
      return "-";
    }

    async function requestJSON(key, path, authName = "apiKey", options = {}) {
      const cfg = serviceConfig(key);
      if (!cfg.baseURL) throw new Error("missing baseURL");
      const response = await fetch(safeURL(cfg.baseURL, path), {
        method: options.method || "GET",
        headers: {
          ...authHeaders(cfg, authName),
          ...(options.body ? { "Content-Type": "application/json" } : {}),
          ...(options.headers || {})
        },
        body: options.body
      });
      const text = await response.text();
      let body = text;
      try {
        body = text ? JSON.parse(text) : null;
      } catch {
        body = text;
      }
      if (!response.ok) {
        throw new Error(`${response.status} ${response.statusText}${text ? `: ${text.slice(0, 160)}` : ""}`);
      }
      return body;
    }

    async function requestText(key, path, authName = "apiKey", options = {}) {
      const cfg = serviceConfig(key);
      if (!cfg.baseURL) throw new Error("missing baseURL");
      const response = await fetch(safeURL(cfg.baseURL, path), {
        method: options.method || "GET",
        headers: authHeaders(cfg, authName),
        body: options.body
      });
      const text = await response.text();
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}${text ? `: ${text.slice(0, 160)}` : ""}`);
      return text || "ok";
    }

    async function localAdminJSON(path, options = {}) {
      const response = await fetch(path, {
        method: options.method || "GET",
        headers: {
          ...(options.body ? { "Content-Type": "application/json" } : {}),
          ...(options.headers || {})
        },
        body: options.body

      let body = text;
      try {
        body = text ? JSON.parse(text) : null;
      } catch {
        body = text;
      }
      if (!response.ok) {
        throw new Error(`${response.status} ${response.statusText}${text ? `: ${text.slice(0, 160)}` : ""}`);
      }
      return body;
    }

    function defaultFlyApp(key) {
      return `starcat-${key}-api`;
    }

    function flyAppForService(key) {
      const apps = flyConfig().apps || {};
      if (Array.isArray(apps)) {
        return apps.find((app) => app === defaultFlyApp(key) || String(app).includes(`-${key}-`)) || defaultFlyApp(key);
      }
      return apps[key] || defaultFlyApp(key);
    }

    function makeFlyEnvDraft(key) {
      return {
        app: flyAppForService(key),
        envPath: "",
        status: "未读取",
        variables: [],
        selected: {},
        result: "尚未设置。"
      };
    }

    async function loadFlyEnv(key) {
      const draft = flyEnvDrafts.get(key) || makeFlyEnvDraft(key);
      draft.status = "读取中";
      flyEnvDrafts.set(key, draft);
      render();
      try {
        const result = await localAdminJSON(`/local-env?service=${encodeURIComponent(key)}`);
        draft.envPath = result.envPath || "";
        draft.variables = (result.variables || []).map((item) => ({
          name: item.name,
          value: item.value == null ? "" : String(item.value)
        }));
        draft.selected = Object.fromEntries(draft.variables.map((item) => [item.name, draft.selected[item.name] !== false]));
        draft.status = draft.variables.length ? `已读取 ${draft.variables.length} 项` : "无变量";
        draft.result = result.error || draft.result;
        log(`${SERVICES[key].fallbackLabel} Fly Env 已读取: ${draft.envPath || "无 .env"}`);
      } catch (error) {
        draft.status = "读取失败";
        draft.result = `读取失败: ${error.message}`;
        log(`${SERVICES[key].fallbackLabel} Fly Env 读取失败: ${error.message}`, "error");
      }
      render();
    }

    async function loadAllFlyEnv() {
      await Promise.all(Object.keys(SERVICES).map(loadFlyEnv));

    function selectedFlyVariables(key, mode) {
      const draft = flyEnvDrafts.get(key);
      if (!draft) return [];
      return draft.variables
        .filter((item) => mode === "all" || draft.selected[item.name])
        .filter((item) => item.name);
    }

    async function applyFlyEnv(key, mode) {
      const draft = flyEnvDrafts.get(key);
      if (!draft) return;
      const variables = selectedFlyVariables(key, mode);
      if (!variables.length) {
        draft.result = "没有选中的变量。";
        render();
        return;
      }
      draft.result = "设置中...";
      render();
      try {
        const result = await localAdminJSON("/fly-env/apply", {
          method: "POST",
          body: JSON.stringify({ service: key, app: draft.app, variables })
        });
        draft.result = JSON.stringify(result, null, 2);
        const successCount = (result.results || []).filter((item) => item.ok).length;
        log(`${SERVICES[key].fallbackLabel} Fly Env 已设置 ${successCount}/${variables.length} 项到 ${result.app || draft.app}`);
      } catch (error) {
        draft.result = `设置失败: ${error.message}`;
        log(`${SERVICES[key].fallbackLabel} Fly Env 设置失败: ${error.message}`, "error");
      }
      render();
    }

            <div class="check-label">${item.label}</div>

            <div class="metric-name">${escapeHTML(item.name)}</div>
            <div class="metric-value">${escapeHTML(String(item.value))}</div>
          </div>`;
        }).join("");

        return `<article class="card" data-service="${key}">
          <div class="card-head">
            <div>
              <h2 class="service-title"><span class="dot ${dotClass}"></span>${escapeHTML(label)}</h2>

          <div class="card-body">
            <div class="checks">${checks}</div>
            <div class="actions">
              <button class="button" type="button" data-refresh="${key}">刷新</button>

            </div>
            <div class="data-panel">
              <div class="data-title">
                <span>${escapeHTML(spec.description)}</span>
                <span>${cfg.apiKey ? "API key 已配置" : "API key 未配置"}</span>
              </div>
              <div class="metrics">${metrics}</div>
              ${renderServiceExtra(key)}

            <button class="button" type="button" data-weekly-action="hello-incremental">增量 featured</button>

    function renderApiConsole(key) {

    function renderApiResultActions(key, endpoint) {
      if (key !== "sharing" || endpoint.path !== "/api/v1/share" || !lastSharingURL) return "";
      return `<div class="api-result-actions">
        <p class="last-link">最近生成: <a href="${escapeHTML(lastSharingURL)}" target="_blank" rel="noreferrer">${escapeHTML(lastSharingURL)}</a></p>
        <button class="button" type="button" data-api-console-action="open-share" data-api-console-service="sharing">打开最近链接</button>
        <button class="button" type="button" data-api-console-action="copy-share" data-api-console-service="sharing">复制链接</button>

    function renderConsoleParams(key, endpoint, draft) {
      return (endpoint.params || []).map((param) => {
        const value = draft.params[param.name] ?? "";
        const label = `${param.in === "path" ? "path" : "query"}: ${param.name}`;
        if (param.options) {
          const options = param.options.map((option) => {
            const selected = String(option) === String(value) ? " selected" : "";
            const title = option === "" ? "(empty)" : option;
            return `<option value="${escapeHTML(option)}"${selected}>${escapeHTML(title)}</option>`;
          }).join("");
          return `<div class="api-param-field">
            <label>${escapeHTML(label)}</label>
            <select data-api-console-service="${escapeHTML(key)}" data-api-console-param="${escapeHTML(param.name)}">${options}</select>
          </div>`;
        }
        return `<div class="api-param-field">
          <label>${escapeHTML(label)}</label>
          <input data-api-console-service="${escapeHTML(key)}" data-api-console-param="${escapeHTML(param.name)}" value="${escapeHTML(value)}">
        </div>`;
      }).join("");
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function refreshService(key) {
      const spec = SERVICES[key];
      const cfg = serviceConfig(key);
      const snapshot = {
        status: "刷新中",
        level: "warn",
        health: { label: "Health", value: "检查中", level: "warn" },
        ping: { label: "Ping", value: spec.checks.includes("ping") ? "检查中" : "不适用", level: "" },
        stats: { label: "Stats", value: "检查中", level: "warn" },
        metrics: []
      };
      state.set(key, snapshot);
      render();

      if (!cfg.baseURL) {
        snapshot.status = "未配置";
        snapshot.level = "bad";
        snapshot.health = { label: "Health", value: "缺少 baseURL", level: "bad" };
        snapshot.ping = { label: "Ping", value: spec.checks.includes("ping") ? "跳过" : "不适用", level: spec.checks.includes("ping") ? "warn" : "" };
        snapshot.stats = { label: "Stats", value: "跳过", level: "warn" };
        state.set(key, snapshot);
        render();
        return;
      }

      try {
        const health = await requestText(key, "/healthz", "apiKey");
        snapshot.health = { label: "Health", value: String(health).slice(0, 80), level: "ok" };
      } catch (error) {
        snapshot.health = { label: "Health", value: error.message, level: "bad" };
      }

      if (spec.checks.includes("ping")) {
        try {
          await requestJSON(key, "/api/v1/ping", "apiKey");
          snapshot.ping = { label: "Ping", value: "鉴权通过", level: "ok" };
        } catch (error) {
          snapshot.ping = { label: "Ping", value: error.message, level: "bad" };
        }
      }

      snapshot.metrics = [];
      const statResponses = new Map();
      for (const stat of spec.stats) {
        if (stat.type === "text") {
          snapshot.metrics.push({ name: stat.label, value: stat.value, help: stat.help });
          continue;
        }
        try {
          let json = statResponses.get(stat.path);
          if (!json) {
            json = await requestJSON(key, stat.path, "apiKey");
            statResponses.set(stat.path, json);
          }
          snapshot.metrics.push({ name: stat.label, value: summarizeValue(readPath(json, stat.pick)), help: stat.help });
        } catch (error) {
          snapshot.metrics.push({ name: stat.label, value: "失败", help: stat.help });
          log(`${spec.fallbackLabel} ${stat.label} 统计失败: ${error.message}`, "warn");
        }
      }

      const failed = [snapshot.health, snapshot.ping].some((item) => item.level === "bad");
      const partial = snapshot.metrics.some((item) => item.value === "失败");
      snapshot.stats = { label: "Stats", value: partial ? "部分失败" : "已刷新", level: partial ? "warn" : "ok" };
      snapshot.status = failed ? "异常" : partial ? "部分可用" : "正常";
      snapshot.level = failed ? "bad" : partial ? "warn" : "ok";
      state.set(key, snapshot);
      render();
      log(`${spec.fallbackLabel} 刷新完成: ${snapshot.status}`);
    }

    async function runAction(key, actionIndex) {
      const spec = SERVICES[key];
      const action = spec.actions[actionIndex];
      const cfg = serviceConfig(key);
      if (!cfg.baseURL) {
        log(`${spec.fallbackLabel} 缺少 baseURL，无法执行 ${action.label}`, "error");
        return;
      }
      if (!cfg[action.auth || "apiKey"]) {
        log(`${spec.fallbackLabel} 缺少 ${action.auth || "apiKey"}，无法执行 ${action.label}`, "error");
        return;
      }
      if (action.confirm && !window.confirm(`确认执行「${action.label}」？`)) return;

      let body;
      if (action.bodyPrompt) {
        const input = window.prompt(action.bodyPrompt, "{}");
        if (input == null) return;
        body = input.trim() || "{}";
        try {
          JSON.parse(body);
        } catch {
          log(`${action.label} 的 JSON body 无效`, "error");
          return;
        }
      }

      try {
        const method = action.method || "POST";
        const result = action.readOnly
          ? await requestJSON(key, action.path, action.auth, { method })
          : await requestJSON(key, action.path, action.auth, { method, body });
        log(`${spec.fallbackLabel} ${action.label} 成功: ${JSON.stringify(result).slice(0, 220)}`);
        await refreshService(key);
      } catch (error) {
        log(`${spec.fallbackLabel} ${action.label} 失败: ${error.message}`, "error");
      }
    }

    function endpointForDraft(key, draft) {
      const endpoints = API_ENDPOINTS[key] || [];
      return endpoints[draft.endpointIndex] || endpoints[0] || {};
    }

    function bodyString(value) {
      if (value == null || value === "") return "";
      if (typeof value === "string") return value;
      return JSON.stringify(value, null, 2);
    }

    function makeConsoleDraft(key, endpointIndex) {
      const endpoint = (API_ENDPOINTS[key] || [])[endpointIndex] || {};
      const params = {};
      for (const param of endpoint.params || []) {
        params[param.name] = param.default || "";
      }
      return {
        endpointIndex,
        params,
        body: bodyString(endpoint.bodyTemplate),
        result: "尚未请求。"
      };
    }

    function resetApiConsole(key) {
      apiConsoleDrafts.set(key, makeConsoleDraft(key, 0));
      render();
      log(`${SERVICES[key].fallbackLabel} 测试模板已重置`);
    }

    function selectApiEndpoint(key, endpointIndex) {
      apiConsoleDrafts.set(key, makeConsoleDraft(key, endpointIndex));
      render();
      log(`${SERVICES[key].fallbackLabel} API Console 已切换接口`);
    }

    function buildConsolePath(endpoint, draft) {
      let path = endpoint.path || "/";
      const query = new URLSearchParams();
      for (const param of endpoint.params || []) {
        const value = draft.params[param.name] ?? "";
        if (param.in === "path") {
          path = path.replace(`{${param.name}}`, encodeURIComponent(value));
        } else if (value !== "") {
          query.set(param.name, value);
        }
      }
      const queryString = query.toString();
      return queryString ? `${path}?${queryString}` : path;
    }

    function shareURLFromResult(result) {
      return readPath(result, "data.share_url") || readPath(result, "share_url") || "";
    }

    function openLastSharingURL() {
      if (!lastSharingURL) return;
      window.open(lastSharingURL, "_blank", "noreferrer");
      log(`已打开 Sharing 最近链接: ${lastSharingURL}`);
    }

    async function copyLastSharingURL() {
      if (!lastSharingURL) return;
      try {
        await navigator.clipboard.writeText(lastSharingURL);
        log(`已复制 Sharing 最近链接: ${lastSharingURL}`);
      } catch (error) {
        log(`复制 Sharing 链接失败: ${error.message}`, "error");
      }
    }

    async function sendApiConsole(key) {
      const cfg = serviceConfig(key);
      const spec = SERVICES[key];
      const draft = apiConsoleDrafts.get(key);
      const endpoint = endpointForDraft(key, draft);
      if (!cfg.baseURL) {
        log(`${spec.fallbackLabel} 缺少 baseURL，无法请求测试接口`, "error");
        return;
      }
      const authName = endpoint.auth || "apiKey";
      if (!cfg[authName]) {
        log(`${spec.fallbackLabel} 缺少 ${authName}，无法请求测试接口`, "error");
        return;
      }

      const method = String(endpoint.method || "GET").toUpperCase();
      const path = buildConsolePath(endpoint, draft);
      if (!path.startsWith("/")) {
        draft.result = "请求失败: path 必须以 / 开头";
        render();
        log(`${spec.fallbackLabel} 测试 path 无效`, "error");
        return;
      }

      let body;
      if (method !== "GET" && method !== "HEAD") {
        const rawBody = String(draft.body || "").trim();
        if (rawBody) {
          try {
            body = JSON.stringify(JSON.parse(rawBody));
          } catch (error) {
            draft.result = `请求失败: JSON body 无效: ${error.message}`;
            render();
            log(`${spec.fallbackLabel} 测试 JSON body 无效: ${error.message}`, "error");
            return;
          }
        }
      }

      try {
        const result = await requestJSON(key, path, authName, { method, body });
        const shareURL = key === "sharing" && endpoint.path === "/api/v1/share" ? shareURLFromResult(result) : "";
        if (shareURL) lastSharingURL = shareURL;
        draft.result = JSON.stringify(result, null, 2);
        log(`${spec.fallbackLabel} API Console 请求完成: ${method} ${path}`);
      } catch (error) {
        draft.result = `请求失败: ${error.message}`;
        log(`${spec.fallbackLabel} API Console 请求失败: ${error.message}`, "error");
      }
      render();
    }

    async function copyApiConsoleResult(key) {
      const draft = apiConsoleDrafts.get(key);
      if (!draft || !draft.result || draft.result === "尚未请求。") return;
      try {
        await navigator.clipboard.writeText(draft.result);
        log(`已复制 ${SERVICES[key].fallbackLabel} API Console JSON`);
      } catch (error) {
        log(`复制 ${SERVICES[key].fallbackLabel} API Console JSON 失败: ${error.message}`, "error");
      }
    }

    async function refreshWeeklyOperations(shouldRender = true) {
      const cfg = serviceConfig("weekly");
      if (!cfg.baseURL || !cfg.adminKey) {
        weeklyOps.status = "缺少 Weekly baseURL 或 adminKey";
        if (shouldRender) render();
        return;
      }
      weeklyOps.status = "刷新中";
      if (shouldRender) render();
      try {
        const [sources, pins] = await Promise.all([
          requestJSON("weekly", "/internal/sources", "adminKey"),
          requestJSON("weekly", "/internal/pins", "adminKey")
        ]);
        weeklyOps.sources = Array.isArray(sources.data) ? sources.data : [];
        weeklyOps.pins = Array.isArray(pins.data) ? pins.data : [];
        weeklyOps.status = `已刷新 ${new Date().toLocaleTimeString()}`;
        // 页面刷新或服务重启后，从持久化来源状态恢复活动批次，而不是依赖旧页面内存。
        const helloGitHub = weeklyOps.sources.find((source) => source.code === "hellogithub");
        const activeBatch = helloGitHub && (helloGitHub.active_backfill || helloGitHub.latest_batch);
        if (!weeklyOps.batch && activeBatch && ["pending", "processing"].includes(activeBatch.status)) {
          weeklyOps.batch = { schema_version: 1, data: activeBatch };
          if (activeBatch.batch_id && weeklyBatchPollID !== activeBatch.batch_id) {
            pollWeeklyBatch(activeBatch.batch_id);
          }
        }
      } catch (error) {
        weeklyOps.status = `刷新失败: ${error.message}`;
        log(`Weekly 运营状态刷新失败: ${error.message}`, "error");
      }
      if (shouldRender) render();
    }

    async function startHelloGitHubSync(mode) {
      if (mode === "backfill" && !window.confirm("确认启动 HelloGitHub 历史回填？任务会持久化并在后台逐期处理。")) return;
      const previousBatchID = weeklyOps.sources.find((source) => source.code === "hellogithub")?.latest_batch?.batch_id || "";
      if (weeklySourceTaskPollTimer) window.clearTimeout(weeklySourceTaskPollTimer);
      const body = { mode };
      if (mode === "backfill") {
        const from = Number.parseInt(weeklyOps.fromVolume, 10);
        const to = weeklyOps.toVolume === "" ? null : Number.parseInt(weeklyOps.toVolume, 10);
        if (!Number.isInteger(from) || from < 1 || (to != null && (!Number.isInteger(to) || to < from))) {
          log("HelloGitHub 回填 volume 范围无效", "error");
          return;
        }
        body.from_volume = from;
        body.to_volume = to;
        body.idempotency_key = `local-admin:hellogithub:${from}:${to == null ? "latest" : to}:${crypto.randomUUID()}`;
      }
      try {
        const result = await requestJSON("weekly", "/internal/sources/hellogithub/sync", "adminKey", {
          method: "POST",
          body: JSON.stringify(body)
        });
        weeklyOps.batch = result;
        const batchID = readPath(result, "data.batch_id");
        log(`HelloGitHub ${mode} 已接受${batchID ? `，batch=${batchID}` : ""}`);
        render();
        if (batchID) pollWeeklyBatch(batchID);
        await refreshWeeklyOperations();
        if (!batchID) pollHelloGitHubLatestBatch(previousBatchID);
      } catch (error) {
        log(`HelloGitHub ${mode} 启动失败: ${error.message}`, "error");
      }
    }

    // featured/reconcile 的 POST 只启动异步 Collector，实际 ingest batch 要等来源抓取
    // 完成后才会持久化。短期轮询来源目录，发现新的 latest_batch 后再切到批次轮询。
    function pollHelloGitHubLatestBatch(previousBatchID) {
      let attempts = 0;
      const poll = async () => {
        attempts += 1;
        try {
          const result = await requestJSON("weekly", "/internal/sources", "adminKey");
          weeklyOps.sources = Array.isArray(result.data) ? result.data : [];
          const helloGitHub = weeklyOps.sources.find((source) => source.code === "hellogithub");
          const latest = helloGitHub && helloGitHub.latest_batch;
          render();
          if (latest?.batch_id && latest.batch_id !== previousBatchID) {
            weeklyOps.batch = { schema_version: 1, data: latest };
            log(`HelloGitHub Collector 已创建 batch=${latest.batch_id}`);
            pollWeeklyBatch(latest.batch_id);
            return;
          }
        } catch (error) {
          log(`HelloGitHub Collector 状态查询失败: ${error.message}`, "warn");
        }
        if (attempts >= 30) {
          log("HelloGitHub Collector 60 秒内未产生新批次；可稍后刷新来源状态。", "warn");
          return;
        }
        weeklySourceTaskPollTimer = window.setTimeout(poll, 2000);
      };
      poll();
    }

    function pollWeeklyBatch(batchID) {
      if (weeklyBatchPollTimer) window.clearTimeout(weeklyBatchPollTimer);
      weeklyBatchPollID = batchID;
      const poll = async () => {
        try {
          const result = await requestJSON("weekly", `/internal/ingest-batches/${encodeURIComponent(batchID)}`, "adminKey");
          weeklyOps.batch = result;
          render();
          const status = readPath(result, "data.status");
          if (["success", "partial_success", "failed"].includes(status)) {
            weeklyBatchPollID = "";
            log(`Weekly batch ${batchID} 进入终态: ${status}`);
            await refreshWeeklyOperations();
            return;
          }
          weeklyBatchPollTimer = window.setTimeout(poll, 5000);
        } catch (error) {
          log(`Weekly batch ${batchID} 轮询失败: ${error.message}`, "warn");
          weeklyBatchPollTimer = window.setTimeout(poll, 15000);
        }
      };
      poll();
    }

    async function searchWeeklyPins() {
      const query = weeklyOps.searchQuery.trim();
      if (!query) {
        weeklyOps.searchResults = [];
        render();
        return;
      }
      try {
        const result = await requestJSON("weekly", `/internal/repos/search?q=${encodeURIComponent(query)}&limit=20`, "adminKey");
        weeklyOps.searchResults = Array.isArray(result.data) ? result.data : [];
        render();
      } catch (error) {
        log(`Weekly 置顶搜索失败: ${error.message}`, "error");
      }
    }

    function addWeeklyPin(repoID) {
      const candidate = weeklyOps.searchResults.find((item) => String(item.gh_repo_id) === String(repoID));
      if (!candidate || weeklyOps.pins.some((item) => String(item.gh_repo_id) === String(repoID))) return;
      weeklyOps.pins.push({ ...candidate, position: weeklyOps.pins.length + 1 });
      render();
    }

    function moveWeeklyPin(index, offset) {
      const target = index + offset;
      if (index < 0 || target < 0 || index >= weeklyOps.pins.length || target >= weeklyOps.pins.length) return;
      [weeklyOps.pins[index], weeklyOps.pins[target]] = [weeklyOps.pins[target], weeklyOps.pins[index]];
      render();
    }

    async function saveWeeklyPins() {
      try {
        const result = await requestJSON("weekly", "/internal/pins", "adminKey", {
          method: "POST",
          body: JSON.stringify({ gh_repo_ids: weeklyOps.pins.map((item) => item.gh_repo_id) })
        });
        weeklyOps.pins = Array.isArray(result.data) ? result.data : [];
        log(`Weekly 已保存 ${weeklyOps.pins.length} 个置顶项目`);
        render();
      } catch (error) {
        log(`Weekly 置顶保存失败: ${error.message}`, "error");
      }
    }

    async function clearWeeklyPins() {
      if (!window.confirm("确认取消全部 Weekly 置顶？")) return;
      weeklyOps.pins = [];
      await saveWeeklyPins();
    }

    function handleWeeklyAction(action, target) {
      if (action === "refresh") refreshWeeklyOperations();
      if (action === "hello-incremental") startHelloGitHubSync("incremental");
      if (action === "hello-reconcile") startHelloGitHubSync("reconcile");
      if (action === "hello-backfill") startHelloGitHubSync("backfill");
      if (action === "pin-search") searchWeeklyPins();
      if (action === "pin-add") addWeeklyPin(target.getAttribute("data-repo-id"));
      if (action === "pin-up") moveWeeklyPin(Number(target.getAttribute("data-pin-index")), -1);
      if (action === "pin-down") moveWeeklyPin(Number(target.getAttribute("data-pin-index")), 1);
      if (action === "pin-remove") {
        weeklyOps.pins.splice(Number(target.getAttribute("data-pin-index")), 1);
        render();
      }
      if (action === "pin-save") saveWeeklyPins();
      if (action === "pin-clear") clearWeeklyPins();
    }

    async function refreshAll() {
      const button = document.getElementById("refreshAllButton");
      button.disabled = true;
      try {
        await Promise.all(Object.keys(SERVICES).map(refreshService));
        await refreshWeeklyOperations();
        document.getElementById("lastRefresh").textContent = new Date().toLocaleTimeString();
      } finally {
        button.disabled = false;
      }
    }

    function updateOverview() {
      const configured = Object.keys(SERVICES).filter((key) => serviceConfig(key).baseURL).length;
      const snapshots = [...state.values()];
      document.getElementById("configuredCount").textContent = configured;
      document.getElementById("healthOkCount").textContent = snapshots.filter((item) => item.health && item.health.level === "ok").length;
      document.getElementById("pingOkCount").textContent = snapshots.filter((item) => item.ping && item.ping.level === "ok").length;
    }

    function bindEvents() {
      document.getElementById("refreshAllButton").addEventListener("click", refreshAll);
      document.getElementById("clearLogButton").addEventListener("click", () => {
        logLines.textContent = "等待操作...";
      });
      document.getElementById("openConfigButton").addEventListener("click", () => {
        const cfg = config();
        const serviceNames = Object.keys(cfg.services || {});
        log(`配置服务: ${serviceNames.length ? serviceNames.join(", ") : "未加载 config.js"}`);
      });
      servicesGrid.addEventListener("click", (event) => {
        const weeklyAction = event.target.getAttribute("data-weekly-action");
        if (weeklyAction) {
          handleWeeklyAction(weeklyAction, event.target);
          return;
        }
        const apiConsoleAction = event.target.getAttribute("data-api-console-action");
        const apiConsoleService = event.target.getAttribute("data-api-console-service");
        if (apiConsoleAction && apiConsoleService) {
          if (apiConsoleAction === "send") {
            sendApiConsole(apiConsoleService);
            return;
          }
          if (apiConsoleAction === "reset") {
            resetApiConsole(apiConsoleService);
            return;
          }
          if (apiConsoleAction === "copy") {
            copyApiConsoleResult(apiConsoleService);
            return;
          }
          if (apiConsoleAction === "open-share") {
            openLastSharingURL();
            return;
          }
          if (apiConsoleAction === "copy-share") {
            copyLastSharingURL();
            return;
          }
        }
        const flyEnvAction = event.target.getAttribute("data-fly-env-action");
        const flyEnvService = event.target.getAttribute("data-fly-env-service");
        if (flyEnvAction && flyEnvService) {
          if (flyEnvAction === "reload") {
            loadFlyEnv(flyEnvService);
            return;
          }
          if (flyEnvAction === "apply-selected") {
            applyFlyEnv(flyEnvService, "selected");
            return;
          }
          if (flyEnvAction === "apply-all") {
            applyFlyEnv(flyEnvService, "all");
            return;
          }
        }
        const refreshKey = event.target.getAttribute("data-refresh");
        if (refreshKey) {
          refreshService(refreshKey);
          return;
        }
        const actionValue = event.target.getAttribute("data-action");
        if (actionValue) {
          const [key, index] = actionValue.split(":");
          runAction(key, Number(index));
        }
      });
      servicesGrid.addEventListener("input", (event) => {
        const weeklyInput = event.target.getAttribute("data-weekly-input");
        if (weeklyInput === "from-volume") weeklyOps.fromVolume = event.target.value;
        if (weeklyInput === "to-volume") weeklyOps.toVolume = event.target.value;
        if (weeklyInput === "pin-search") weeklyOps.searchQuery = event.target.value;
        const apiConsoleService = event.target.getAttribute("data-api-console-service");
        const apiConsoleParam = event.target.getAttribute("data-api-console-param");
        const apiConsoleField = event.target.getAttribute("data-api-console-field");
        if (apiConsoleService && apiConsoleParam && apiConsoleDrafts.has(apiConsoleService)) {
          const draft = apiConsoleDrafts.get(apiConsoleService);
          draft.params[apiConsoleParam] = event.target.value;
        }
        if (apiConsoleService && apiConsoleField === "body" && apiConsoleDrafts.has(apiConsoleService)) {
          const draft = apiConsoleDrafts.get(apiConsoleService);
          draft.body = event.target.value;
        }
        const flyEnvService = event.target.getAttribute("data-fly-env-service");
        const flyEnvName = event.target.getAttribute("data-fly-env-name");
        if (flyEnvService && flyEnvName && flyEnvDrafts.has(flyEnvService)) {
          const draft = flyEnvDrafts.get(flyEnvService);
          const variable = draft.variables.find((item) => item.name === flyEnvName);
          if (variable) variable.value = event.target.value;
        }
      });
      servicesGrid.addEventListener("change", (event) => {
        const apiConsoleService = event.target.getAttribute("data-api-console-service");
        const apiConsoleField = event.target.getAttribute("data-api-console-field");
        const apiConsoleParam = event.target.getAttribute("data-api-console-param");
        if (apiConsoleService && apiConsoleField === "endpointIndex") {
          selectApiEndpoint(apiConsoleService, Number(event.target.value));
          return;
        }
        if (apiConsoleService && apiConsoleParam && apiConsoleDrafts.has(apiConsoleService)) {
          const draft = apiConsoleDrafts.get(apiConsoleService);
          draft.params[apiConsoleParam] = event.target.value;
        }
        const flyEnvService = event.target.getAttribute("data-fly-env-service");
        const flyEnvCheck = event.target.getAttribute("data-fly-env-check");
        if (flyEnvService && flyEnvCheck && flyEnvDrafts.has(flyEnvService)) {
          const draft = flyEnvDrafts.get(flyEnvService);
          draft.selected[flyEnvCheck] = event.target.checked;
        }
      });
    }

    if (!window.STARCAT_ADMIN_CONFIG) {
      configWarning.classList.add("show");
    }
    bindEvents();
    render();
    refreshAll().catch((error) => log(`刷新全部失败: ${error.message}`, "error"));
    loadAllFlyEnv().catch((error) => log(`Fly Env 读取失败: ${error.message}`, "error"));
  </script>
</body>
</html>
