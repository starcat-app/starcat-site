# Starcat Direct 测试落地页 Nginx 配置
# 域名: test.starcat.ink
# 证书路径: /etc/nginx/encrypt/starcat/（由 NAS update_certs.sh 上传）

server {
    # 监听 HTTP 并重定向到 HTTPS
    listen 80;
    server_name test.starcat.ink;

    # HTTP 明文入口只做跳转，不暴露正文内容。
    add_header X-Content-Type-Options "nosniff" always;
    return 301 https://$host$request_uri;
}

server {
    # 监听 HTTPS
    listen 443 ssl http2;
    server_name test.starcat.ink;

    # SSL 配置
    ssl_certificate /etc/nginx/encrypt/starcat/fullchain.pem;
    ssl_certificate_key /etc/nginx/encrypt/starcat/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:starcat_test_ssl:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 网站根目录
    root /var/www/starcat-test;
    index index.html;

    # 日志配置
    access_log /var/log/nginx/starcat_test_access.log;
    error_log /var/log/nginx/starcat_test_error.log;

    # 安全头。页面当前使用内联 CSS/JS 与 unpkg 的 lucide 图标脚本，因此 CSP
    # 只放行这些明确来源；后续若把脚本本地化，可移除 unpkg 和 unsafe-inline。
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://starcat-license-api-staging.fly.dev; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # 基础路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sparkle appcast 必须尽快反映最新版本，避免客户端读到缓存的旧更新清单。
    location = /appcast.xml {
        types { application/xml xml; }
        default_type application/xml;
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires 0 always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://starcat-license-api-staging.fly.dev; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    }

    # Direct 渠道安装包。只允许访问真实文件，不做 SPA fallback，也不开放目录索引。
    location /downloads/ {
        types {
            application/x-apple-diskimage dmg;
            text/plain sha256;
        }
        default_type application/octet-stream;
        try_files $uri =404;
        autoindex off;
        expires 6M;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    }

    # JS 和 CSS 文件不缓存（落地页迭代频繁）
    location ~* \.(?:css|js)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires 0 always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://starcat-license-api-staging.fly.dev; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        access_log off;
    }

    # 其他静态文件缓存 6 个月
    location ~* \.(?:ico|gif|jpe?g|png|svg|woff|woff2|ttf|otf|eot|webp|webm|mp4)$ {
        expires 6M;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        access_log off;
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # 防止 Favicon 报错
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # 禁止访问隐藏文件、源码残留、环境文件和常见备份文件。
    location ~ /\.(?!well-known/) {
        log_not_found off;
        access_log off;
        deny all;
    }

    location ~* (?:^|/)(?:\.env|\.git|\.svn|\.hg|composer\.(?:json|lock)|package(?:-lock)?\.json|pnpm-lock\.yaml|yarn\.lock|tsconfig\.json|vite\.config\.[cm]?js)$ {
        log_not_found off;
        access_log off;
        deny all;
    }

    location ~* \.(?:bak|backup|old|orig|swp|swo|tmp|temp|sql|sqlite|db|log|ini|conf|pem|key|crt)$ {
        log_not_found off;
        access_log off;
        deny all;
    }
}
