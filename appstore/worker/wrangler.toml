# Cloudflare Worker 配置 — dong4j.app 路由代理
# 部署: 走 starcat-site/appstore/deploy.sh（末尾会 wrangler deploy）
# 单独部署: cd supports/starcat-site/appstore/worker && wrangler deploy

name = "dong4j-app-router"
main = "worker.js"
compatibility_date = "2025-07-09"

# Worker 路由 — dong4j.app/* 的所有请求都由此 Worker 处理
# zone_name 会自动从你的 Cloudflare 账户中查找
routes = [
    { pattern = "dong4j.app/*", zone_name = "dong4j.app" }
]
